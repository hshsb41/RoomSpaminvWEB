<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iControl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #f2f2f7; /* iOS Light Gray Background */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            width: 90%;
            max-width: 360px;
            padding: 35px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .ios-input {
            background: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            font-size: 16px;
            outline: none;
            text-align: center;
            color: #000;
        }

        .ios-btn {
            background: #007aff; /* Apple Blue */
            color: white;
            font-weight: 600;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            margin-top: 20px;
            transition: all 0.2s ease;
        }

        .ios-btn:active {
            transform: scale(0.97);
            background: #0056b3;
        }

        /* Custom Alert */
        .modal {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 14px;
            width: 270px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.2);
            display: none;
        }
    </style>
</head>
<body>

    <div class="glass-panel text-center">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">CKRPRO INVITE SPAM</h1>
        <p class="text-gray-500 text-xs mb-10 font-medium tracking-wide">FREE FIRE SPAM INVITE WHATSAPP 9840825493 IT'S PAID SERVICE</p>

        <div class="space-y-4">
            <input type="text" id="uid" placeholder="Enter Target UID" class="ios-input">
            
            <div class="ios-input flex justify-between items-center opacity-60">
                <span class="text-sm">Duration</span>
                <span class="text-sm font-bold">5s</span>
            </div>

            <button onclick="send()" id="mainBtn" class="ios-btn">Send Spam</button>
        </div>
    </div>

    <div id="overlay" class="overlay"></div>
    <div id="modal" class="modal">
        <div class="p-5 text-center">
            <p id="modalMsg" class="text-black font-semibold text-base"></p>
        </div>
        <button onclick="closeModal()" class="w-full py-3 text-blue-500 font-bold border-t border-gray-200">OK</button>
    </div>

    <script>
        const modal = document.getElementById('modal');
        const overlay = document.getElementById('overlay');

        function showAlert(msg) {
            document.getElementById('modalMsg').innerText = msg;
            modal.classList.add('show');
            overlay.style.display = 'block';
        }

        function closeModal() {
            modal.classList.remove('show');
            overlay.style.display = 'none';
        }

        async function send() {
            const uid = document.getElementById('uid').value;
            const btn = document.getElementById('mainBtn');

            if(!uid) return showAlert("Please enter a UID!");

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const res = await fetch('/send_spam', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: uid})
                });
                const data = await res.json();
                showAlert(data.message);
            } catch (e) {
                showAlert("Server Error");
            } finally {
                btn.innerText = "Send Spam";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
